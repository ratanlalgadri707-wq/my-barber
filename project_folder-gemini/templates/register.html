<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Shop</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="top-nav">
        <h2>Register Shop</h2>
        <a href="/" class="nav-link">Home</a>
    </div>

    <div class="container">
        <div class="card">
            <form action="/register" method="POST">
                <div class="input-group">
                    <label>Shop Name</label>
                    <input type="text" name="shop_name" required placeholder="e.g., Raj Hair Salon">
                </div>
                <div class="input-group">
                    <label>Barber Name</label>
                    <input type="text" name="barber_name" required placeholder="e.g., Raj">
                </div>
                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" name="mobile" required placeholder="10 digit number">
                </div>
                <div class="input-group">
                    <label>Address</label>
                    <input type="text" name="address" required placeholder="Shop Address">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn btn-primary">Register Shop</button>
            </form>
            <p style="text-align: center; margin-top: 15px;">
                Already have an account? <a href="/login" style="color: #ffd700;">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
