<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="top-nav">
        <h2>{{ shop.shop_name }}</h2>
        <a href="/logout" class="nav-link">Logout</a>
    </div>

    <div class="container">
        <div class="card" style="text-align: center;">
            <h3>Shop Status</h3>
            {% if shop.shop_status == 'open' %}
                <div class="status-indicator" style="color: #28a745;">Current: OPEN</div>
                <div class="btn-group">
                    <a href="/close_shop" class="btn btn-danger">Set to CLOSED</a>
                </div>
            {% else %}
                <div class="status-indicator" style="color: #dc3545;">Current: CLOSED</div>
                <div class="btn-group">
                    <a href="/open_shop" class="btn btn-success">Set to OPEN</a>
                </div>
            {% endif %}
        </div>

        <div class="card">
            <h3 style="text-align: center; margin-bottom: 0;">Waiting Customers</h3>
            <div class="queue-display">
                <div class="queue-number">{{ shop.queue_count }}</div>
            </div>
            
            <div class="queue-controls">
                <a href="/remove" class="btn-circle btn-danger">-</a>
                <a href="/add" class="btn-circle btn-success">+</a>
            </div>
            <p style="text-align: center; color: #888; margin-top: 20px; font-size: 14px;">Tap + when a customer arrives.<br>Tap - when a customer is served.</p>
        </div>
    </div>
</body>
</html>
